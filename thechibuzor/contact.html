<section id="contact" class="mb-0">
  <div class="container">
    <div class="heading-section text-center  ">

          <img src="images/mail.png">
        </div>
      <div class="col-lg-6 col-sm-12 col-md-7">
        
        <div class="form">
        <form id="contact-form">
              <input type="hidden" name="contact_number">
          <div class="form-row">
            <div class="form-group col-lg-6">
              <input type="text" class="form-control" name="name" required="yes" placeholder="your name" minlength="3" maxlength="30">
            </div>
            <div class="form-group col-lg-6">
              <input type="email" class="form-control" name="email" required="yes" placeholder="your e-mail">
            </div>
          </div>
          <div class="form-group">
            <input class="form-control" type="text" name="subject" required="yes" placeholder="subject" minlength="3">
          </div>
          <div class="form-group">
            <textarea class="form-control" name="message" required="yes" placeholder="message"  rows="5" minlength="8"></textarea>
          </div>
            <input type="submit" class="form-control" value="submit">
        </form>
      </div>
    </div>
